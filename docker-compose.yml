version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-yssf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yssf-dev-password}
      POSTGRES_DB: ${POSTGRES_DB:-yssf}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-yssf}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=development
      - JWT_SECRET=${JWT_SECRET:-yssf-dev-secret-change-in-production}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-yssf}:${POSTGRES_PASSWORD:-yssf-dev-password}@db:5432/${POSTGRES_DB:-yssf}
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - backend

volumes:
  pgdata:

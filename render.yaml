databases:
  - name: yssf-db
    plan: free
    databaseName: yssf
    ipAllowList: []

services:
  - type: web
    name: yssf-backend
    plan: free
    runtime: node
    region: oregon
    rootDir: backend
    # Migrations only (NOT db push --accept-data-loss) and a conditional seed.
    # Seed is opt-in via SEED_ON_DEPLOY=1 to avoid overwriting admin password
    # on every deploy.
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: yssf-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://yssfd.vercel.app
      - key: NODE_ENV
        value: production

